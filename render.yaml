services:
  - type: web
    name: pi-dashboard-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: node src/index.js
    envVars:
      - key: MQTT_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: MQTT_WS_PATH
        sync: false
      - key: BASE_TOPIC
        value: dt

  - type: web
    name: pi-dashboard-web
    env: static
    rootDir: web
    # Work around npm optional-deps bug affecting Rollup native package on Linux
    # by using pnpm via corepack on Render's Linux build image.
    buildCommand: rm -rf node_modules package-lock.json && corepack enable && pnpm install --no-frozen-lockfile && pnpm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_PI_SERVER_URL
        sync: false

