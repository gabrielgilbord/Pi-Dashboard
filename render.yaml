services:
  - type: web
    name: pi-dashboard-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: node src/index.js
    envVars:
      - key: MQTT_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: BASE_TOPIC
        value: dt

  - type: web
    name: pi-dashboard-web
    env: static
    rootDir: web
    buildCommand: npm ci --include=optional && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_PI_SERVER_URL
        sync: false

