services:
  - type: web
    name: pi-dashboard-server
    env: node
    plan: free
    rootDir: server
    buildCommand: npm ci
    startCommand: node src/index.js
    envVars:
      - key: MQTT_URL
        sync: false
      - key: MQTT_USERNAME
        sync: false
      - key: MQTT_PASSWORD
        sync: false
      - key: BASE_TOPIC
        value: dt

  - type: web
    name: pi-dashboard-web
    env: static
    rootDir: web
    # Work around npm optional-deps bug affecting Rollup native package on Linux.
    # See: https://github.com/npm/cli/issues/4828
    buildCommand: rm -f package-lock.json && npm install --include=optional --no-audit --no-fund && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_PI_SERVER_URL
        sync: false

